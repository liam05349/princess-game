<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Platformer Game</title>
  <link rel="stylesheet" href="style.css">

  <script type="module" src="overlays.js" defer></script>
  <script type="module" src="game.js" defer></script>

  <style>
    .inventory-box {
      position: fixed;
      top: 35%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(38, 18, 112, 0.85);
      padding: 20px 40px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(12, 22, 55, 0.6);
      color: white;
      text-align: center;
      z-index: 9999;
      font-family: 'Press Start 2P', cursive;
      transition: opacity 0.3s ease;
      opacity: 1;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <div id="menu">
    <h1>The Princess</h1>
    <button id="startBtn">Start</button>
    <h2>Choose the level:</h2>
    <button class="level-btn" data-level="0">Level 1</button>
    <button class="level-btn" data-level="1">Level 2</button>
    <button class="level-btn" data-level="2">Level 3</button>
  </div>

  <div class="quote" id="quote"></div>
  <div id="lifeLostMessage" class="messageBox" style="display:none;"></div>

  <div id="inventoryBox" class="inventory-box hidden">
    <h2>Inventory</h2>
    <div class="inventory-slots">
      <div class="slot" id="slot-0">?</div>
      <div class="slot" id="slot-1">?</div>
      <div class="slot" id="slot-2">?</div>
    </div>
  </div>

  <div id="game-container" style="position: relative; display: none;">
    <button id="settingsBtn"
      style="position: absolute; top: 20px; right: 20px; font-family: 'Press Start 2P', cursive; font-size: 1rem; padding: 10px; z-index: 10000; cursor: pointer; background: #261270; color: white; border: 2px solid #fff; border-radius: 8px; display: none;">⚙️</button>
    <canvas id="gameCanvas" width="900" height="600" style="display: block;"></canvas>

    <div id="pause-overlay" class="overlay-box hidden">
      <div class="pause-content">
        <h2> Paused </h2>
        <p style="color: #ffd1dc;">Need a break?</p>
        <p>Level: <span id="pause-level"></span> | Lives: <span id="pause-lives"></span></p>

        <button id="resumeBtn">Continue Game</button>
        <button id="restartLevelBtn">Restart Level</button>
        <button id="backToMenuBtn">Main Menu</button>
      </div>
    </div>

    <div id="won-overlay" class="overlay-box won-overlay hidden">
      <div class="won-content">
        <h2> Level <span id="won-level"></span> Completed! </h2>
        <p style="color: #ffd1dc;">Great job, Boooo! 💖</p>

        <div style="display: flex; gap: 15px; justify-content: center;">
          <button id="wonMainMenuBtn">Main Menu</button>
          <button id="nextLevelBtn">Next Level</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    window.addEventListener("error", (event) => {
      const msgBox = document.getElementById("lifeLostMessage");
      if (!msgBox) return;
      msgBox.textContent = `Script error: ${event.message}`;
      msgBox.style.display = "block";
      msgBox.classList.add("show");
    });

    window.addEventListener("unhandledrejection", (event) => {
      const msgBox = document.getElementById("lifeLostMessage");
      if (!msgBox) return;
      msgBox.textContent = `Script error: ${event.reason?.message || event.reason}`;
      msgBox.style.display = "block";
      msgBox.classList.add("show");
    });

    window.addEventListener("DOMContentLoaded", () => {
      const startBtn = document.getElementById("startBtn");
      const gameContainer = document.getElementById("game-container");
      const msgBox = document.getElementById("lifeLostMessage");

      startBtn.addEventListener("click", () => {
        setTimeout(() => {
          if (gameContainer.style.display === "none" && startBtn.textContent !== "Continue") {
            msgBox.textContent = "game.js did not start. Check that Live Server is opening this folder, not another copy.";
            msgBox.style.display = "block";
            msgBox.classList.add("show");
          }
        }, 200);
      });
    });

    const quotes = [
      "Happy 21st Birthday Boo!",
      "I wish you all the best",
      "*farts",
      " Do you need to fart? Press 'F'",
      "  ❤️❤️❤️ "
    ];

    function randomQuote() {
      const quoteEl = document.getElementById("quote");
      const random = quotes[Math.floor(Math.random() * quotes.length)];
      quoteEl.textContent = random;
    }

    randomQuote();
    window.quoteInterval = setInterval(randomQuote, 4000);
  </script>

</body>

</html>
